# lap5r:
#   display_name: Leonid Petrov
#   arxiv_names:
#     - Leonid Petrov
#     - L. Petrov
#   normalized_names:
#     - leonid petrov
#   semantic_scholar_author_ids: []
#   orcid: []
#   safe_match: true
#   notes: "Rare enough; still check active appointment."

